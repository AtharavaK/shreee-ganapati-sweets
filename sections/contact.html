<section id="contact">
  <div class="contact-inner">

    <div class="contact-info reveal">
      <span class="section-label">Get in Touch</span>
      <h2 class="section-title">Place Your <em>Order</em></h2>
      <div class="divider"></div>

      <div class="contact-detail">
        <div class="contact-icon">📍</div>
        <div class="contact-detail-text">
          <strong>Location</strong>
          <span>Kharadi, Pune, Maharashtra</span>
        </div>
      </div>

      <div class="contact-detail">
        <div class="contact-icon">📞</div>
        <div class="contact-detail-text">
          <strong>Phone / WhatsApp</strong>
          <span><a href="tel:+918830249239">+91 88302 49239</a></span>
        </div>
      </div>

      <div class="contact-detail">
        <div class="contact-icon">📸</div>
        <div class="contact-detail-text">
          <strong>Instagram</strong>
          <span><a href="https://instagram.com/shreeeganapatisweets" target="_blank">@shreeeganapatisweets</a></span>
        </div>
      </div>
    </div>

    <div class="order-form-card reveal">
      <h3>🍬 Quick Order Form</h3>

      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="orderName" placeholder="e.g. Priya Sharma">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="orderPhone" placeholder="+91 XXXXX XXXXX">
      </div>
      <div class="form-group">
        <label>Select Sweet</label>
        <select id="orderItem">
          <option value="">-- Choose a sweet --</option>
          <option>Motichoor Ladoo</option>
          <option>Besan Ladoo</option>
          <option>Gulab Jamun</option>
          <option>Peanut Ladoo</option>
          <option>Balushahi</option>
          <option>Rava Ladoo</option>
        </select>
      </div>
      <div class="form-group">
        <label>Delivery Address</label>
        <textarea id="orderAddress" placeholder="House no., Street, Area, Pune…" style="min-height:70px"></textarea>
      </div>
      <div class="form-group">
        <label>Special Request (optional)</label>
        <textarea id="orderNote" placeholder="Quantity, occasion, any special instructions…"></textarea>
      </div>
      <button class="form-submit" onclick="placeOrder()">Send Order Request 🎁</button>
    </div>

  </div>
</section>

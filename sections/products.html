<section id="products">
  <span class="section-label reveal">Handcrafted Selections</span>
  <h2 class="section-title reveal">Our <em>Sweets</em></h2>
  <div class="divider"></div>

  <!-- Minimum Order Banner -->
  <div class="min-order-banner reveal">
    <span class="min-order-icon">🛒</span>
    <span>Minimum order: <strong id="minOrderLabel"></strong> &nbsp;|&nbsp; Pricing is <strong>per kg</strong> &nbsp;|&nbsp; Fresh made on order</span>
  </div>

  <div class="products-grid" id="productList"></div>
</section>

<script>
  (function renderProducts() {
    // Set minimum order label from config
    const minLabel = document.getElementById('minOrderLabel');
    if (minLabel && typeof MIN_ORDER_LABEL !== 'undefined') {
      minLabel.textContent = MIN_ORDER_LABEL;
    }

    const grid = document.getElementById('productList');
    if (!grid || typeof products === 'undefined') return;

    products.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'card reveal';
      card.style.transitionDelay = (i * 0.07) + 's';
      card.innerHTML = `
        <div class="card-img-wrap">
          ${p.image
            ? `<img
                src="images/${p.image}"
                alt="${p.name}"
                class="card-photo"
                onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
               >
               <span class="card-emoji card-emoji-fallback" style="display:none">${p.emoji}</span>`
            : `<span class="card-emoji">${p.emoji}</span>`
          }
          ${p.badge ? `<span class="card-badge">${p.badge}</span>` : ''}
        </div>
        <div class="card-body">
          <h3>${p.name}</h3>
          <p>${p.description}</p>
        </div>
        <div class="card-footer">
          <div class="price">₹${p.price}<span> / kg</span></div>
          <button class="card-btn" onclick="quickOrder('${p.name}')">Order</button>
        </div>
      `;
      grid.appendChild(card);
    });

    if (window._observer) {
      grid.querySelectorAll('.reveal').forEach(el => window._observer.observe(el));
    }
  })();
</script>

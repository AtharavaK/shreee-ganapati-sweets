<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shreee Ganapati Homemade Sweets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav id="mainNav">
  <div class="nav-logo">✦ Shreee Ganapati</div>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#products">Sweets</a></li>
    <li><a href="#contact">Order</a></li>
  </ul>
</nav>

<div id="header"></div>
<div id="about"></div>
<div id="products"></div>
<div id="contact"></div>

<footer>
  <p>© 2024 <span>Shreee Ganapati Homemade Sweets</span> · Made with ❤️ in Kharadi, Pune</p>
</footer>

<!-- Toast notification -->
<div class="toast" id="toast">
  <strong>✅ Order Received!</strong>
  We'll contact you on WhatsApp shortly to confirm.
</div>

<!-- WhatsApp Button -->
<a class="whatsapp-btn" href="https://api.whatsapp.com/send?phone=918830249239&text=Hi!%20I%20want%20to%20place%20an%20order%20for%20sweets" target="_blank" title="Chat on WhatsApp">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="28" height="28" fill="white"><path d="M16 1C7.716 1 1 7.716 1 16c0 2.627.678 5.1 1.865 7.255L1 31l7.98-1.833A14.94 14.94 0 0016 31c8.284 0 15-6.716 15-15S24.284 1 16 1zm0 27.5a12.44 12.44 0 01-6.33-1.73l-.453-.27-4.73 1.086 1.12-4.613-.296-.473A12.5 12.5 0 1116 28.5zm6.877-9.366c-.376-.188-2.224-1.097-2.568-1.222-.345-.125-.596-.188-.847.188-.251.376-.97 1.222-1.19 1.473-.219.25-.438.282-.814.094-.376-.188-1.587-.585-3.023-1.865-1.118-.997-1.872-2.228-2.092-2.604-.219-.376-.023-.579.165-.766.169-.168.376-.438.564-.657.188-.219.25-.376.376-.627.125-.25.063-.47-.031-.658-.094-.188-.847-2.04-1.16-2.793-.305-.733-.615-.633-.847-.645l-.72-.013c-.25 0-.658.094-.002.97 1.003 1.13 1.003 2.25 0 3.253z"/></svg>
  <span>Order on WhatsApp</span>
</a>

<!-- Chatbot -->
<div class="chat-widget">
  <div class="chat-bubble" id="chatBubble">
    <div class="chat-header-bar">
      <div class="chat-avatar">🍬</div>
      <div class="chat-header-text">
        <strong>Ganapati Sweets</strong>
        <span class="chat-status"><span class="chat-online">●</span> Online · Ask us anything</span>
      </div>
      <button class="chat-close-btn" onclick="toggleChat()">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="Ask about prices, delivery…" onkeydown="if(event.key==='Enter') sendMsg()">
      <button class="chat-send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
  <button class="chat-toggle-btn" onclick="toggleChat()">💬</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="data/products.js"></script>
<script src="js/chatbot.js"></script>
<script src="js/main.js"></script>

</body>
</html>
